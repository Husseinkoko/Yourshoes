<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yourshoes | Husseinkoko</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00FFFF;
            --camel: #C19A6B;
            --dark: #121212;
            --white: #ffffff;
            --gray: #f8f9fa;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background-color: var(--gray);
            color: var(--dark);
            line-height: 1.6;
        }

        <header>
    <a href="cart.html" class="cart-widget">
        <span style="font-size: 1.2em;">🛒</span>
        <div style="text-align: right;">
            <div style="font-size: 0.8em; font-weight: bold;">السلة (<span id="cart-count">0</span>)</div>
            <div style="font-size: 0.7em; color: var(--camel);"><span id="cart-total">0</span> ج.م</div>
        </div>
    </a>

    <h1>Yourshoes</h1>
    <div class="tagline">بإدارة Hussein koko</div>
</header>

 /* تنسيق مربع السلة الجديد بجانب اللوجو */
.cart-widget {
    position: absolute;
    top: 25px;
    left: 20px; /* مكان المربع في الجهة اليسرى المقابلة للاسم */
    background: var(--white);
    border: 2px solid var(--camel);
    padding: 10px 15px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.cart-widget:hover {
    background-color: var(--aqua);
    border-color: var(--dark);
    transform: scale(1.05);
}

header {
    position: relative; /* ضروري لكي يظهر مربع السلة داخله */
}

/* إخفاء شريط السلة القديم */
.cart-bar { display: none; }

        /* شريط التنقل */
        nav { background: var(--dark); padding: 12px 0; text-align: center; }
        nav a { color: var(--white); text-decoration: none; margin: 0 20px; transition: 0.3s; }
        nav a:hover { color: var(--aqua); }

        /* لوحة الترحيب */
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1460353581641-37baddab0fa2?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        /* حاوية المنتجات */
        .main-container { max-width: 1200px; margin: 40px auto; padding: 0 25px; }
        .products-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .product-item {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
            border: 1px solid #eaeaea;
            text-align: center;
        }

        .product-item:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: var(--aqua); }

        .img-container { width: 100%; height: 300px; background: #eee; overflow: hidden; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }

        .details-box { padding: 20px; }
        .item-name { font-size: 1.3em; font-weight: 700; }
        .item-price { color: var(--camel); font-size: 1.4em; font-weight: bold; margin: 15px 0; }

        /* أزرار السلة */
        .add-to-cart-btn {
            background-color: var(--dark);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        .add-to-cart-btn:hover { background-color: var(--aqua); color: var(--dark); }

        footer { background: var(--dark); color: white; text-align: center; padding: 40px; margin-top: 60px; }
    </style>
</head>
<body>

    <header>
        <h1>Yourshoes</h1>
        <div class="tagline">بإدارة Hussein koko</div>
    </header>

    <div class="cart-bar">
        🛒 السلة: <span id="cart-count">0</span> قطع | المجموع: <span id="cart-total">0</span> ج.م
    </div>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="#products">المتجر</a>
        <a href="#">من نحن</a>
    </nav>

    <section class="hero-section">
        <div class="hero-content">
            <h2>متجر حسين كوكو لتجارة الاحذية الجملة</h2>
            <p>أحذية تجمع بين الراحة والاناقة</p>
        </div>
    </section>

    <div class="main-container" id="products">
        <div class="products-layout">
            
            <div class="product-item">
                <div class="img-container">
                    <img src="shoe1.jpg" alt="حذاء" class="product-img">
                </div>
                <div class="details-box">
                    <div class="item-name">سنيكرز مودرن</div>
                    <div class="item-price">1200 ج.م</div>
                    <button class="add-to-cart-btn" onclick="addToCart('سنيكرز مودرن', 1200)">أضف إلى السلة 🛒</button>
                </div>
            </div>

            <div class="product-item">
                <div class="img-container">
                    <img src="shoe2.jpg" alt="حذاء" class="product-img">
                </div>
                <div class="details-box">
                    <div class="item-name">حذاء كلاسيك فخم</div>
                    <div class="item-price">1550 ج.م</div>
                    <button class="add-to-cart-btn" onclick="addToCart('حذاء كلاسيك فخم', 1550)">أضف إلى السلة 🛒</button>
                </div>
            </div>

            <div class="product-item">
                <div class="img-container">
                    <img src="shoe3.jpg" alt="حذاء" class="product-img">
                </div>
                <div class="details-box">
                    <div class="item-name">حذاء رياضي خفيف</div>
                    <div class="item-price">850 ج.م</div>
                    <button class="add-to-cart-btn" onclick="addToCart('حذاء رياضي خفيف', 850)">أضف إلى السلة 🛒</button>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; جميع الحقوق محفوظة لمتجر Yourshoes | Husseinkoko</p>
    </footer>

    <script>
    let cartCount = 0;
    let cartTotal = 0;

    function addToCart(name, price) {
        cartCount++;
        cartTotal += price;

        // تحديث الأرقام داخل المربع الصغير
        document.getElementById('cart-count').innerText = cartCount;
        document.getElementById('cart-total').innerText = cartTotal.toLocaleString();

        // تنبيه بسيط
        alert("تمت إضافة " + name + " إلى سلتك! ✅");
    }
</script>

</body>
</html>
