<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yourshoes | Husseinkoko</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00FFFF; /* لون الأكوا */
            --camel: #C19A6B; /* لون جملي فخم */
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            color: var(--dark);
        }

        /* الهيدر - الجزء العلوي */
        header {
            background-color: var(--white);
            border-bottom: 2px solid var(--camel);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            margin: 0;
            color: var(--dark);
            letter-spacing: 2px;
            font-weight: 700;
        }

        .tagline {
            color: var(--camel);
            font-size: 0.9em;
            margin-top: 5px;
        }

        /* قسم الترحيب */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1549298916-b41d501d3772?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            text-align: center;
        }

        /* شبكة المنتجات */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            border: 1px solid #eee;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--aqua);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
        }

        .product-info {
            padding: 20px;
            text-align: center;
        }

        .product-title {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .product-price {
            color: var(--camel);
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .buy-btn {
            background-color: var(--dark);
            color: var(--white);
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .buy-btn:hover {
            background-color: var(--aqua);
            color: var(--dark);
        }

        footer {
            background: var(--dark);
            color: var(--white);
            text-align: center;
            padding: 30px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Yourshoes</h1>
        <div class="tagline">بإدارة Husseinkoko - فخامة الأحذية بين يديك</div>
    </header>

    <div class="hero">
        <div>
            <h2>تشكيلة الموسم الجديد</h2>
            <p>تصاميم هادئة وفخمة تناسب ذوقك الرفيع</p>
        </div>
    </div>

    <div class="container">
        <div class="products-grid">
            <div class="product-card">
                <div class="product-image">ارفعي صورة الحذاء 1</div>
                <div class="product-info">
                    <div class="product-title">حذاء كلاسيك فخم</div>
                    <div class="product-price">1200 ج.م</div>
                    <button class="buy-btn">اطلبي الآن عبر الواتساب</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">ارفعي صورة الحذاء 2</div>
                <div class="product-info">
                    <div class="product-title">حذاء رياضي أنيق</div>
                    <div class="product-price">950 ج.م</div>
                    <button class="buy-btn">اطلبي الآن عبر الواتساب</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">ارفعي صورة الحذاء 3</div>
                <div class="product-info">
                    <div class="product-title">صندل صيفي مودرن</div>
                    <div class="product-price">750 ج.م</div>
                    <button class="buy-btn">اطلبي الآن عبر الواتساب</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 جميع الحقوق محفوظة لمتجر Yourshoes</p>
    </footer>

</body>
</html>
